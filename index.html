
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casa x Buteco</title>

<style>

body{
margin:0;
background:#b7b19f;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
}

/* TITULOS */

.header,.footer{
background:#e5e5e5;
padding:15px 120px;
border-radius:40px;
font-size:40px;
letter-spacing:10px;
color:#8a7c2b;
margin:20px;
}

/* TABULEIRO */

.board{
position:relative;
width:900px;
height:900px;
}

/* CASAS */

.tile{
position:absolute;
width:70px;
height:70px;
background:#efefef;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#8a7c2b;
font-weight:bold;
}

.big{
width:140px;
height:140px;
font-size:36px;
color:white;
background:transparent;
border:4px solid white;
flex-direction:column;
}

/* jogadores */

.players{
position:absolute;
bottom:2px;
display:flex;
gap:2px;
flex-wrap:wrap;
justify-content:center;
width:100%;
}

.player{
width:14px;
height:14px;
border-radius:50%;
border:2px solid white;
}

/* dado */

.dice-container{
margin-top:20px;
perspective:800px;
cursor:pointer;
}

.dice{
width:70px;
height:70px;
position:relative;
transform-style:preserve-3d;
transition:transform 1s;
}

.face{
position:absolute;
width:70px;
height:70px;
background:white;
border:2px solid #ccc;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

.front{transform:translateZ(35px);}
.back{transform:rotateY(180deg) translateZ(35px);}
.right{transform:rotateY(90deg) translateZ(35px);}
.left{transform:rotateY(-90deg) translateZ(35px);}
.top{transform:rotateX(90deg) translateZ(35px);}
.bottom{transform:rotateX(-90deg) translateZ(35px);}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="header">CASA</div>

<div class="board" id="board"></div>

<div class="footer">BUTECO</div>

<div class="dice-container" onclick="rollDice()">

<div class="dice" id="dice">

<div class="face front">1</div>
<div class="face back">6</div>
<div class="face right">3</div>
<div class="face left">4</div>
<div class="face top">2</div>
<div class="face bottom">5</div>

</div>
</div>

<div id="hud"></div>

<!-- modal jogadores -->

<div class="modal" id="playerModal">

<div class="modal-box">

<h2>Escolha jogadores</h2>

<button onclick="addPlayer('red')">🔴</button>
<button onclick="addPlayer('blue')">🔵</button>
<button onclick="addPlayer('yellow')">🟡</button>
<button onclick="addPlayer('black')">⚫</button>
<button onclick="addPlayer('pink')">🩷</button>
<button onclick="addPlayer('green')">🟢</button>

<br><br>

<button onclick="startGame()">Começar</button>

</div>

</div>

<!-- carta -->

<div class="modal" id="cardModal" style="display:none">

<div class="modal-box">

<h2>Sorte ou Azar</h2>
<p id="cardText"></p>

<button onclick="closeCard()">Continuar</button>

</div>

</div>

<script>

/* POSIÇÕES DO TABULEIRO (layout imagem) */

const positions=[
[50,120],
[200,120],
[300,140],
[400,160],
[520,120],
[640,150],
[750,200],
[620,260],
[500,300],
[360,250],
[260,300],
[150,260],
[80,320],
[120,420],
[220,470],
[320,420],
[420,450],
[520,500],
[650,450],
[760,420],
[720,520],
[580,600],
[450,620],
[320,600],
[200,570],
[100,600],
[200,700],
[320,740],
[450,760],
[600,720],
[750,650]
]

const sorte=[10,13,20,24,29]

const board=document.getElementById("board")

positions.forEach((p,i)=>{

let tile=document.createElement("div")

tile.className="tile"
tile.style.left=p[0]+"px"
tile.style.top=p[1]+"px"

if(i==0){

tile.classList.add("big")
tile.innerHTML="1<br>INÍCIO"

}

else if(i==30){

tile.classList.add("big")
tile.innerHTML="31<br>FIM"

}

else if(sorte.includes(i+1)){

tile.classList.add("big")
tile.innerHTML=(i+1)+"<br>SORTE"

}

else{

tile.innerHTML=i+1

}

let players=document.createElement("div")
players.className="players"

tile.appendChild(players)

board.appendChild(tile)

})

/* jogo */

let players=[]
let pos=[]
let turn=0
let pending=0

const cards=[
{txt:"Avance 2 casas",move:2},
{txt:"Volte 2 casas",move:-2},
{txt:"Avance 3 casas",move:3},
{txt:"Volte 3 casas",move:-3}
]

function addPlayer(c){

if(players.length>=6)return
if(players.includes(c))return

players.push(c)
pos.push(0)

let token=document.createElement("div")
token.className="player"
token.style.background=c
token.id="p"+c

document.querySelectorAll(".players")[0].appendChild(token)

}

function startGame(){

if(players.length==0)return

document.getElementById("playerModal").style.display="none"

updateHUD()

}

function updateHUD(){

document.getElementById("hud").innerText="Jogador: "+players[turn]

}

function rollDice(){

const dice=document.getElementById("dice")
const result=Math.floor(Math.random()*6)+1

const rx=(Math.floor(Math.random()*4)+4)*360
const ry=(Math.floor(Math.random()*4)+4)*360

let x=0,y=0

switch(result){

case 1:x=0;y=0;break
case 6:x=0;y=180;break
case 3:x=0;y=-90;break
case 4:x=0;y=90;break
case 2:x=-90;y=0;break
case 5:x=90;y=0;break

}

dice.style.transform=`rotateX(${rx+x}deg) rotateY(${ry+y}deg)`

setTimeout(()=>{

pending=result
moveStep()

},1000)

}

function moveStep(){

if(pending<=0){

tileAction()
return

}

pos[turn]++
pending--

if(pos[turn]>30)pos[turn]=30

updateToken()

setTimeout(moveStep,300)

}

function updateToken(){

let token=document.getElementById("p"+players[turn])

document.querySelectorAll(".players")[pos[turn]].appendChild(token)

}

function tileAction(){

if(sorte.includes(pos[turn]+1)){

drawCard()
return

}

checkWin()

}

function drawCard(){

let c=cards[Math.floor(Math.random()*cards.length)]

document.getElementById("cardText").innerText=c.txt

document.getElementById("cardModal").style.display="flex"

pending=c.move

}

function closeCard(){

document.getElementById("cardModal").style.display="none"

if(pending>0)moveStep()

else if(pending<0){

pending=Math.abs(pending)
moveBack()

}

else nextTurn()

}

function moveBack(){

if(pending<=0){

nextTurn()
return

}

pos[turn]--
pending--

updateToken()

setTimeout(moveBack,300)

}

function checkWin(){

if(pos[turn]==30){

alert("🏆 "+players[turn]+" venceu!")

location.reload()

}

nextTurn()

}

function nextTurn(){

turn++

if(turn>=players.length)turn=0

updateHUD()

}

</script>

</body>
</html>
