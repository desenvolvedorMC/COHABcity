
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COHAB CITY</title>

<style>

/* MOBILE RESPONSIVE LAYOUT */


@media (max-width:900px){

.board{

transform:scale(.75);
transform-origin:top center;

}

.logo{

font-size:32px;

}

.dice{

width:70px;
height:70px;

}

.face{

width:70px;
height:70px;
font-size:26px;

}

.front{transform:translateZ(35px);}
.back{transform:rotateY(180deg) translateZ(35px);}
.right{transform:rotateY(90deg) translateZ(35px);}
.left{transform:rotateY(-90deg) translateZ(35px);}
.top{transform:rotateX(90deg) translateZ(35px);}
.bottom{transform:rotateX(-90deg) translateZ(35px);}

.player{

width:18px;
height:18px;

}

}

@media (max-width:600px){

.board{

transform:scale(.55);

}

.logo{

font-size:26px;

}

.dice{

width:80px;
height:80px;

}

.face{

width:80px;
height:80px;
font-size:28px;

}

.front{transform:translateZ(40px);}
.back{transform:rotateY(180deg) translateZ(40px);}
.right{transform:rotateY(90deg) translateZ(40px);}
.left{transform:rotateY(-90deg) translateZ(40px);}
.top{transform:rotateX(90deg) translateZ(40px);}
.bottom{transform:rotateX(-90deg) translateZ(40px);}

.hud{

font-size:18px;

}

.modal-box{

width:90%;

}

}

:root{
--laranja:#d3734a;
--verde:#3d5a45;
--bege:#f4e8d1;
}

body{
background:#fdf5e6;
display:flex;
flex-direction:column;
align-items:center;
font-family:Segoe UI;
margin:0;
}

.hud{
margin:15px;
padding:10px 20px;
background:white;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.board{
display:grid;
grid-template-columns:repeat(11,80px);
grid-template-rows:repeat(7,80px);
gap:5px;
background:#e0d2bc;
padding:10px;
border-radius:10px;
}

.case{
background:white;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
font-weight:bold;
text-align:center;
position:relative;
padding:4px;
}

.laranja{border-top:8px solid var(--laranja);}
.verde{border-top:8px solid var(--verde);}
.especial{background:#fdfdfd;}

.player-container{
position:absolute;
bottom:2px;
left:2px;
right:2px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.player{
width:16px;
height:16px;
border-radius:50%;
border:2px solid white;
}

.center{
grid-column:2/11;
grid-row:2/7;
background:var(--bege);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:8px;
border:2px dashed var(--laranja);
}

.logo{
font-size:42px;
color:var(--laranja);
font-weight:900;
margin-bottom:15px;
}

.dice-container{
perspective:600px;
cursor:pointer;
}

.dice{
width:60px;
height:60px;
position:relative;
transform-style:preserve-3d;
transition:transform 1s ease-out;
}

.face{
position:absolute;
width:60px;
height:60px;
background:white;
border:2px solid #ccc;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
}

.front{transform:translateZ(30px);}
.back{transform:rotateY(180deg) translateZ(30px);}
.right{transform:rotateY(90deg) translateZ(30px);}
.left{transform:rotateY(-90deg) translateZ(30px);}
.top{transform:rotateX(90deg) translateZ(30px);}
.bottom{transform:rotateX(-90deg) translateZ(30px);}

#result{
margin-top:10px;
font-weight:bold;
}

.pos-0{grid-area:7/1}
.pos-1{grid-area:6/1}
.pos-2{grid-area:5/1}
.pos-3{grid-area:4/1}
.pos-4{grid-area:3/1}
.pos-5{grid-area:2/1}
.pos-6{grid-area:1/1}

.pos-7{grid-area:1/2}
.pos-8{grid-area:1/3}
.pos-9{grid-area:1/4}
.pos-10{grid-area:1/5}
.pos-11{grid-area:1/6}
.pos-12{grid-area:1/7}
.pos-13{grid-area:1/8}
.pos-14{grid-area:1/9}
.pos-15{grid-area:1/10}
.pos-16{grid-area:1/11}

.pos-17{grid-area:2/11}
.pos-18{grid-area:3/11}
.pos-19{grid-area:4/11}
.pos-20{grid-area:5/11}
.pos-21{grid-area:6/11}

.pos-22{grid-area:7/11}
.pos-23{grid-area:7/10}
.pos-24{grid-area:7/9}
.pos-25{grid-area:7/8}
.pos-26{grid-area:7/7}
.pos-27{grid-area:7/6}
.pos-28{grid-area:7/5}
.pos-29{grid-area:7/4}
.pos-30{grid-area:7/3}
.pos-31{grid-area:7/2}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
animation:cardPop .4s ease;
}

@keyframes cardPop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

</style>

</head>

<body>

<div class="hud" id="hud"></div>

<div class="board">

<div class="center">

<div class="logo">COHAB CITY</div>

<div class="dice-container" onclick="rollDice()">

<div class="dice" id="dice">

<div class="face front">1</div>
<div class="face back">6</div>
<div class="face right">3</div>
<div class="face left">4</div>
<div class="face top">2</div>
<div class="face bottom">5</div>

</div>

</div>

<div id="result">Clique no dado</div>

</div>

</div>

<div class="modal" id="playerModal">

<div class="modal-box">

<h2>Escolha jogadores</h2>

<button onclick="addPlayer('red')">🔴</button>
<button onclick="addPlayer('blue')">🔵</button>
<button onclick="addPlayer('yellow')">🟡</button>
<button onclick="addPlayer('black')">⚫</button>
<button onclick="addPlayer('pink')">🩷</button>
<button onclick="addPlayer('green')">🟢</button>

<br><br>

<button onclick="startGame()">Começar</button>

</div>

</div>

<div class="modal" id="cardModal" style="display:none">

<div class="modal-box">

<h2>Sorte ou Azar</h2>

<p id="cardText"></p>

<button onclick="closeCard()">Continuar</button>

</div>

</div>

<script>

const board=document.querySelector(".board")

const tiles=[
"Início","Sorte","Gráfica","Farmácia","Sorte","Escola","Polícia",
"Trailer","Padaria","Pizzaria","Correios","Adega","Sorte","Feira","Salão","Lava Rápido","Sorte",
"Sanarinho","Parque","Marley","Barufs","Alphaville",
"Uber","BMX","Atacadão","Viação","Sorte","Shopping","KM21","Academia","Sorte","Fim"
]

tiles.forEach((t,i)=>{

let d=document.createElement("div")

d.className="case pos-"+i

if(t=="Sorte")d.classList.add("verde")
else if(t=="Início"||t=="Fim")d.classList.add("especial")
else d.classList.add("laranja")

d.innerHTML=t+"<div class='player-container'></div>"

board.appendChild(d)

})

let players=[]
let pos=[]
let turn=0

const cards=[
{txt:"Avance 2 casas",move:2},
{txt:"Volte 2 casas",move:-2},
{txt:"Avance 3 casas",move:3},
{txt:"Volte 3 casas",move:-3}
]

let pendingMove=0

function addPlayer(color){

players.push(color)
pos.push(0)

let p=document.createElement("div")
p.className="player"
p.style.background=color
p.id="p"+color

document.querySelector(".pos-0 .player-container").appendChild(p)

}

function startGame(){

document.getElementById("playerModal").style.display="none"

updateHUD()

}

function updateHUD(){

document.getElementById("hud").innerText="Jogador: "+players[turn]

}

function rollDice(){

const dice=document.getElementById('dice')
const result=Math.floor(Math.random()*6)+1

const xRand=Math.floor(Math.random()*3+4)*360
const yRand=Math.floor(Math.random()*3+4)*360

let xFinal=0,yFinal=0

switch(result){

case 1:xFinal=0;yFinal=0;break
case 6:xFinal=0;yFinal=180;break
case 3:xFinal=0;yFinal=-90;break
case 4:xFinal=0;yFinal=90;break
case 2:xFinal=-90;yFinal=0;break
case 5:xFinal=90;yFinal=0;break

}

dice.style.transform=`rotateX(${xRand+xFinal}deg) rotateY(${yRand+yFinal}deg)`

setTimeout(()=>{

pendingMove=result
stepMove()

document.getElementById("result").innerText="Você tirou "+result

},1000)

}

function stepMove(){

if(pendingMove<=0){

tileAction()

return

}

pos[turn]++
pendingMove--

if(pos[turn]>31)pos[turn]=31

let color=players[turn]
let token=document.getElementById("p"+color)

document.querySelector(".pos-"+pos[turn]+" .player-container").appendChild(token)

setTimeout(stepMove,300)

}

function tileAction(){

let tile=document.querySelector(".pos-"+pos[turn])

if(tile.classList.contains("verde")){

drawCard()
return

}

if(pos[turn]==31){

alert("🏆 "+players[turn]+" venceu!")
location.reload()

}

turn++
if(turn>=players.length)turn=0

updateHUD()

}

function drawCard(){

let c=cards[Math.floor(Math.random()*cards.length)]

document.getElementById("cardText").innerText=c.txt

document.getElementById("cardModal").style.display="flex"

pendingMove=c.move

}

function closeCard(){

document.getElementById("cardModal").style.display="none"

if(pendingMove>0){

stepMove()

}else if(pendingMove<0){

pendingMove=Math.abs(pendingMove)
stepMoveBack()

}else{

turn++
if(turn>=players.length)turn=0

updateHUD()

}

}

function stepMoveBack(){

if(pendingMove<=0){

turn++
if(turn>=players.length)turn=0

updateHUD()

return

}

pos[turn]--
pendingMove--

let color=players[turn]
let token=document.getElementById("p"+color)

document.querySelector(".pos-"+pos[turn]+" .player-container").appendChild(token)

setTimeout(stepMoveBack,300)

}



function ajustarZoomTabuleiro(){

const board=document.querySelector(".board")

const larguraTela=window.innerWidth

const larguraTabuleiro=11*80+60 // casas + gaps + padding

let escala=larguraTela/larguraTabuleiro

if(escala>1)escala=1

board.style.transform="scale("+escala+")"

board.style.transformOrigin="top center"

}

window.addEventListener("load",ajustarZoomTabuleiro)

window.addEventListener("resize",ajustarZoomTabuleiro)

</script>

</body>
</html>
